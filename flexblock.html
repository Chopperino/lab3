<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>flexblock</title>
    <style>
      body {
        margin: 0;
        height: 100vh;
      }
      div {
        border: 1px solid black;
        width: 90%;
        margin: 0;
        font-size: 20px;
        box-sizing: border-box;
      }
      #header {
        background-color: blue;
        height: 10%;
      }
      #sidebar {
        background-color: rgb(255, 196, 0);
        float: left;
        width: 15%;
        height: 100%;
      }
      #main {
        height: 80%;
      }
      #footer {
        background-color: blue;
        height: 10%;
      }
    </style>
  </head>
  <body>
    <div id="sidebar">2</div>
    <div id="header">1</div>
    <div id="main">4</div>
    <div id="footer">3</div>
  </body>
</html>
