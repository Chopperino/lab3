<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>fixtable</title>
    <style>
      body {
        margin: 0 auto;
      }
      #body {
        border: 2px solid black;
        width: 900px;
        height: 1100px;
      }
      #header {
        height: 50px;
        background-color: blue;
        border-top: 0;
      }
      #main {
        height: 300px;
        text-align: center;
      }
      #footer {
        height: 50px;
        background-color: blue;
        text-align: center;
        border-top: 0;
      }
      #side-bar {
        width: 200px;
        background-color: rgb(255, 208, 0);
      }
      table {
        margin: 0;
        border-collapse: collapse;
        border-spacing: 15px;
        box-sizing: content-box;
        border-spacing: 0px;
      }
      .space {
        width: 50px;
      }
      td,
      th {
        text-align: center;
        box-sizing: border-box;
        padding: 0;
        border: 1px solid black;
      }
      #main-table {
        margin-left: 50px;
        margin-right: 50px;
        width: 600px;
        height: 1100px;
      }
    </style>
  </head>
  <body>
    <table id="body">
      <tr>
        <th id="side-bar">2</th>
        <th>
          <table id="main-table">
            <tr>
              <th id="header">1</th>
            </tr>
            <tr>
              <td id="main">4</td>
            </tr>
            <tr>
              <td id="footer">3</td>
            </tr>
          </table>
        </th>
      </tr>
    </table>
  </body>
</html>
